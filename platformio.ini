[platformio]
default_envs = esp32dev

; ============================================================================
; WiFi ESP (Coordinator) - Development Build
; ============================================================================
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Use larger partition scheme (3MB app, 1.5MB SPIFFS instead of 1.2MB app)
board_build.partitions = huge_app.csv

; Serial Monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build flags - OPTIMIZED FOR FLASH SIZE
build_flags =
    -DCORE_DEBUG_LEVEL=2        ; Reduced debug level (warnings/errors only)
    -DDEV_BUILD                  ; Enable dev features
    -DLOG_LEVEL_INFO             ; INFO level logs (reduced from DEBUG)
    -Os                          ; Optimize for SIZE (not speed)
    -ffunction-sections          ; Each function in own section
    -fdata-sections              ; Each data in own section
    -Wl,--gc-sections            ; Garbage collect unused sections
    -fno-exceptions              ; Disable C++ exceptions (saves ~30KB)
    -DENABLE_RTDB                ; Enable Realtime Database
    -DDISABLE_SD=true            ; Disable SD card support
    ; -DDISABLE_FLASH=true       ; ENABLED: Need SPIFFS for offline queue

; Libraries
lib_deps =
    mobizt/Firebase Arduino Client Library for ESP8266 and ESP32@^4.4.14
    tzapu/WiFiManager@^2.0.16-rc.2
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.3

; Upload settings
upload_speed = 921600

; ============================================================================
; WiFi ESP - Production Build
; ============================================================================
[env:esp32prod]
extends = env:esp32dev
build_flags =
    -DCORE_DEBUG_LEVEL=0        ; No debug output in production
    -DPROD_BUILD
    -DLOG_LEVEL_WARN             ; Only WARN/ERROR/CRITICAL
    -Os                          ; Optimize for SIZE
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -fno-exceptions
    -DENABLE_RTDB
    -DDISABLE_SD=true
    ; -DDISABLE_FLASH=true       ; ENABLED: Need SPIFFS for offline queue
    -DNDEBUG                     ; Disable asserts

; ============================================================================
; WiFi ESP - Unit Testing
; ============================================================================
[env:native]
platform = native
test_framework = unity
build_flags =
    -DUNIT_TEST
    -std=c++11
